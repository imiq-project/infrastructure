services:
  proxy:
    build: services/proxy
    pull_policy: build
    restart: always
    depends_on:
      - orion
      - dashboard
    environment:
      - API_KEY=$API_KEY
      - THE_THINGS_NET_WEBHOOK_URL=$THE_THINGS_NET_WEBHOOK_URL

  mongo:
    image: mongo:4.2
    restart: always
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb

  orion:
    image: fiware/orion:3.3.0
    restart: always
    depends_on:
      - mongo
    entrypoint: ["sh", "-c", "rm /tmp/contextBroker.pid; /usr/bin/contextBroker -fg -multiservice -dbhost mongo -corsOrigin __ALL"]
    environment:
      - LOG_LEVEL=ERROR

  migrate:
    build: services/migrate
    restart: always
    pull_policy: build

  crate:
    image: crate:5.6
    restart: always
    volumes:
      - crate_data:/data
    environment:
      - CRATE_HEAP_SIZE=1g
    command: crate -Cauth.host_based.enabled=false -Cnetwork.host=0.0.0.0

  quantumleap:
    image: fiware/quantum-leap:1.0.0
    restart: always
    depends_on:
      - crate
      - migrate
    environment:
      - CRATE_HOST=crate

  dashboard:
    build: services/dashboard
    pull_policy: build
    restart: always

  collector:
    build:
      context: services/collector
      dockerfile: Dockerfile
    pull_policy: build
    restart: always
    depends_on:
    - orion
    environment:
    - OWM_API_KEY=$OPEN_WEATHER_MAP_API_KEY
    - LASA2X_ENDPOINT=$LASA2X_ENDPOINT
    - LASA2X_API_KEY=$LASA2X_API_KEY

  scheduled:
    build: services/scheduled
    pull_policy: build
    restart: always
    depends_on:
    - orion

  dashbot:
    image: ghcr.io/imiq-project/dashbot:v0.2.0
    restart: always
    depends_on:
    - orion
    environment:
    - FIWARE_BASE_URL=http://orion:1026/v2
    - OPENAI_API_KEY=$OPENAI_API_KEY
    - OPENAI_BASE_URL=$OPENAI_BASE_URL
    - NEO4J_URI=$NEO4J_URI
    - NEO4J_USERNAME=$NEO4J_USERNAME
    - NEO4J_PASSWORD=$NEO4J_PASSWORD
    - NEO4J_DATABASE=$NEO4J_DATABASE
    - ORS_API_KEY=$ORS_API_KEY
    - ORS_BASE_URL=$ORS_BASE_URL
    - TOMTOM_API_KEY=$TOMTOM_API_KEY
    - TOMTOM_TIMEOUT=$TOMTOM_TIMEOUT
    - HF_HUB_OFFLINE=$HF_HUB_OFFLINE
    - MAX_CONVERSATION_HISTORY=$MAX_CONVERSATION_HISTORY
    - HTTP_TIMEOUT=$HTTP_TIMEOUT
    - SEMANTIC_CACHE_ENABLED=$SEMANTIC_CACHE_ENABLED
    - MAGDEBURG_LAT=$MAGDEBURG_LAT
    - MAGDEBURG_LON=$MAGDEBURG_LON
    - USE_SINGLE_AGENT=$USE_SINGLE_AGENT
    - SINGLE_AGENT_MODEL=$SINGLE_AGENT_MODEL
    - AGENT_TIMEOUT=$AGENT_TIMEOUT
    - AGENT_VERBOSE_LOGGING=$AGENT_VERBOSE_LOGGING
    - NEO4J_STAGING_URI=$NEO4J_STAGING_URI
    - NEO4J_STAGING_USERNAME=$NEO4J_STAGING_USERNAME
    - NEO4J_STAGING_PASSWORD=$NEO4J_STAGING_PASSWORD
    - NEO4J_STAGING_DATABASE=$NEO4J_STAGING_DATABASE
  sensors:
    build:
      context: services/sensors
      dockerfile: Dockerfile
    pull_policy: build
    restart: always
    depends_on:
    - orion
    environment:
    - WEATHER_STATION_PASSWORD=$WEATHER_STATION_PASSWORD
    - THE_THINGS_NET_WEBHOOK_URL=$THE_THINGS_NET_WEBHOOK_URL

volumes:
  mongo_data:
  mongo_config:
  crate_data:


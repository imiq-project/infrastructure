http:
  middlewares:
    add-v2-prefix:
      addPrefix:
        prefix: "/v2"
    check-api-key: 
      plugin:
        traefik-api-key-auth:
          keys:
            - $API_KEY
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - "/api/dayplanner"
          - "/api/orion"
          - "/api/quantumleap"
          - "/api/dashbot"
          - "/api/graphhopper"

  services:
    dayplanner:
      loadBalancer:
        servers:
          - url: http://dayplanner:80
    dashboard:
      loadBalancer:
        servers:
          - url: http://dashboard:1000
    dashbot:
      loadBalancer:
        servers:
          - url: http://dashbot:5000
    orion:
      loadBalancer:
        servers:
          - url: http://orion:1026
    sensors:
      loadBalancer:
        servers:
          - url: http://sensors:80
    quantumleap:
      loadBalancer:
        servers:
          - url: http://quantumleap:8668
    hotco:
      loadBalancer:
        servers:
          - url: http://hotco:5000
    graphhopper:
      loadBalancer:
        servers:
          - url: http://graphhopper:8080

  routers:
    dashboard:
      rule: PathPrefix("/")
      service: dashboard
    dayplanner:
      rule: PathPrefix("/api/dayplanner")
      service: dayplanner
      middlewares:
        - strip-api-prefix
    dashbot:
      rule: PathPrefix("/api/dashbot")
      service: dashbot
      middlewares:
        - strip-api-prefix
    orion-get:
      rule: PathPrefix("/api/orion") && Method("GET")
      service: orion
      middlewares:
        # Do not check api key for get requests
        - strip-api-prefix
        - add-v2-prefix
    orion:
      rule: PathPrefix("/api/orion")
      service: orion
      middlewares:
        - check-api-key
        - strip-api-prefix
        - add-v2-prefix
    sensors:
      rule: PathPrefix("/data/upload.php") || PathPrefix("$THE_THINGS_NET_WEBHOOK_URL")
      service: sensors
    quantumleap:
      rule: PathPrefix("/api/quantumleap")
      service: quantumleap
      middlewares:
        - strip-api-prefix
        - add-v2-prefix
    hotco:
      rule: PathPrefix("/api/hotco")
      service: hotco
    graphhopper:
      rule: PathPrefix("/api/graphhopper")
      service: graphhopper
      middlewares:
        - strip-api-prefix

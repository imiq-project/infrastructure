http:
  middlewares:
    add-v2-prefix:
      addPrefix:
        prefix: "/v2"
    check-api-key: 
      plugin:
        traefik-api-key-auth:
          keys:
            - $API_KEY
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - "/api/orion"
          - "/api/quantumleap"
          - "/api/dashbot"
          - "/api/geocode"

  services:
    dashboard:
      loadBalancer:
        servers:
          - url: http://dashboard:1000
    dashbot:
      loadBalancer:
        servers:
          - url: http://dashbot:5000
    orion:
      loadBalancer:
        servers:
          - url: http://orion:1026
    sensors:
      loadBalancer:
        servers:
          - url: http://sensors:80
    quantumleap:
      loadBalancer:
        servers:
          - url: http://quantumleap:8668
    geocode:
      loadBalancer:
        servers:
          - url: http://geocode:8001

  routers:
    dashboard:
      rule: PathPrefix("/")
      service: dashboard
    orion-get:
      rule: PathPrefix("/api/orion") && Method("GET")
      service: orion
      middlewares:
        # Do not check api key for get requests
        - strip-api-prefix
        - add-v2-prefix
    orion:
      rule: PathPrefix("/api/orion")
      service: orion
      middlewares:
        - check-api-key
        - strip-api-prefix
        - add-v2-prefix
    sensors:
      rule: PathPrefix("/data/upload.php") || PathPrefix("$THE_THINGS_NET_WEBHOOK_URL")
      service: sensors
    quantumleap:
      rule: PathPrefix("/api/quantumleap")
      service: quantumleap
      middlewares:
        - strip-api-prefix
        - add-v2-prefix
    dashbot:
      rule: PathPrefix("/api/dashbot")
      service: dashbot
      middlewares:
        - strip-api-prefix
    geocode:
      rule: PathPrefix("/api/geocode")
      service: geocode
      middlewares:
        - strip-api-prefix

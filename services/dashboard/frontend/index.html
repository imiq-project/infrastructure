<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IMIQ Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.css" />
    <link rel="stylesheet" href="https://unpkg.com/cesium@1.120.0/Build/Cesium/Widgets/widgets.css"/>
    <link rel="stylesheet" href="/api/dashbot/static/dashbot-widget.css"/>
    <link rel="stylesheet" href="/style.css"/>
    <script src="/api/dashbot/static/dashbot-widget.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
  </head>
  
  <body>

  <dialog id="chartDialog">
    <p id="chartText"></p>
    <canvas id="chartCanvas"></canvas>
    <button class="close-btn" onclick="closeGraph()">✕</button>
  </dialog>

  <div id="smartView" class="smart-view-container">
      
      <div class="mobile-drawer-header" id="mobileDrawerTrigger">
          <div class="drawer-handle"></div>
      </div>
      
      <div class="sidebar-content">
          <div class="sidebar-logo-container desktop-only-logo">
              <a href="http://imiq.ovgu.de" target="_blank">
                  <img src="IMIQ_LOGO_official.svg" class="sidebar-logo" alt="IMIQ">
              </a>
          </div>
          <div id="sensorTypes"></div>
      </div>
  </div>

  <!-- Map container -->
  <div id="map">  

    <div class="mobile-only-logo">
        <a href="http://imiq.ovgu.de" target="_blank">
            <img src="IMIQ_LOGO_official.svg" class="sidebar-logo" alt="IMIQ">
        </a>
    </div>

    <div id="modeSwitcher">
        <button id="btn2D" title="Switch to 2D">🗺️ 2D</button>
        <button id="btn3D" title="Switch to 3D">🧭 3D</button>
    </div>

    <div id="cesiumOverlay">
        <div id="cesiumContainer"></div>
    </div>
  </div>
     <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!--  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script> -->
     <script src="https://unpkg.com/cesium@1.120.0/Build/Cesium/Cesium.js"></script> 
     <script src="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.js"></script>
     <script src="script.js"></script>
  </body>
  
</html>
